user:
  create: |
    CREATE TABLE "user" (
      id UUID PRIMARY KEY,
      username VARCHAR(255) NOT NULL UNIQUE,
      passwd TEXT NOT NULL,
      email VARCHAR(255) NOT NULL UNIQUE,
      roles TEXT[] NOT NULL DEFAULT '{}',
      is_active BOOLEAN NOT NULL DEFAULT FALSE
    )
  get_by_id: |
    SELECT id, username, passwd, email, roles, is_active
    FROM "user"
    WHERE id = $1
  get_by_username: |
    SELECT id, username, passwd, email, roles, is_active
    FROM "user"
    WHERE username = $1
  get_by_email: |
    SELECT id, username, passwd, email, roles, is_active
    FROM "user"
    WHERE email = $1
  insert: |
    INSERT INTO
      "user" (id, username, passwd, email, roles, is_active)
    VALUES
      ($1, $2, $3, $4, $5, $6)
  delete_by_id: |
    DELETE FROM "user"
    WHERE id = $1