<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #fafafa; }
    </style>
</head>
<body class="flex min-h-screen items-center justify-center p-4">
    <div class="w-full max-w-md rounded-xl border border-zinc-800 bg-zinc-950 p-8 shadow-2xl">
        <div class="flex flex-col space-y-1 text-center">
            <h1 class="text-2xl font-semibold tracking-tight">Welcome Back</h1>
            <p id="description" class="text-xs uppercase tracking-widest text-zinc-500">Select an authentication provider</p>
        </div>

        <div class="mt-8 flex flex-col items-center justify-center gap-4">
            <button 
                onclick="loginWithGoogle()"
                class="flex w-full items-center justify-center gap-3 rounded-lg border border-zinc-800 bg-zinc-900 px-4 py-2.5 text-sm font-medium transition-all hover:bg-zinc-800 active:scale-[0.98]"
            >
                <svg class="h-5 w-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>

            <p id="status-text" class="text-xs text-zinc-600">Secure OAuth 2.0 Connection</p>
        </div>
    </div>

    <script>
        function loginWithGoogle() {
            const client_id = "{{google_client_id}}";
            const redirect_url = "{{oauth_redirect_url}}";

            const rootUrl = 'https://accounts.google.com/o/oauth2/v2/auth';

            const options = {
                redirect_uri: redirect_url,
                client_id: client_id,
                access_type: 'offline',
                response_type: 'code',
                prompt: 'consent',
                scope: [
                    'https://www.googleapis.com/auth/userinfo.profile',
                    'https://www.googleapis.com/auth/userinfo.email',
                ].join(' '),
            };

            const qs = new URLSearchParams(options);

            // Redirect the user to Google
            window.location.href = `${rootUrl}?${qs.toString()}`;
        }
    </script>
</body>
</html>
